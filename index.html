<title>Gimjaban Yield Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script>
window.storage = {
  async get(key, shared){
    const raw = localStorage.getItem('gz_store_'+key);
    if (raw === null) throw new Error('not found');
    return { key, value: raw, shared: !!shared };
  },
  async set(key, value, shared){
    localStorage.setItem('gz_store_'+key, value);
    return { key, value, shared: !!shared };
  },
  async delete(key, shared){
    localStorage.removeItem('gz_store_'+key);
    return { key, deleted:true, shared: !!shared };
  },
  async list(prefix, shared){
    const keys = Object.keys(localStorage).filter(k=>k.startsWith('gz_store_'+(prefix||''))).map(k=>k.replace('gz_store_',''));
    return { keys, prefix, shared: !!shared };
  }
};
</script>
<style>

<div id="app-root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const STORE_BATCHES = "gz_batches_v2";
const STORE_KHO = "gz_kho_v2";
const STORE_PRODUCTS = "gz_products_v2";
const STORE_TARE = "gz_tare_v2";

const DEFAULT_TARE = { xe1: 12.91, xe2: 13.39 };
const DEFAULT_PRODUCTS = [
  { code: "1024505", name: "BBG RONG BIỂN GIÒN NƯỚC TƯƠNG 50G*20EA", klbb: 0.05 },
  { code: "1024506", name: "BBG RONG BIỂN GIÒN NƯỚC TƯƠNG 30GX20EA", klbb: 0.03 },
  { code: "1024508", name: "BBG RONG BIỂN GIÒN CÁ HỒI 45GX20EA", klbb: 0.045 },
  { code: "1027251", name: "BBG RB GIÒN CHÀ BÔNG GÀ 45G*20EA", klbb: 0.045 },
  { code: "1027250", name: "BBG RB GIÒN CHÀ BÔNG BÒ 45G*20EA", klbb: 0.045 },
  { code: "1027245", name: "BBG RB GIÒN CHÀ BÔNG TÔM 45G*20EA", klbb: 0.045 },
  { code: "1027689", name: "BBG RB GIÒN CHÀ BÔNG BÒ 30G*2*20EA", klbb: 0.03 },
  { code: "1027691", name: "BBG RB GIÒN CHÀ BÔNG TÔM 30G*2*20EA", klbb: 0.03 },
  { code: "1027692", name: "BBG RB GIÒN CHÀ BÔNG GÀ 30G*2*20EA", klbb: 0.03 },
];

function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmt(n, d=2){ if (n===null||n===undefined||isNaN(n)) return "—"; return Number(n).toLocaleString('vi-VN',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtPct(n){ if (n===null||n===undefined||isNaN(n)) return "—"; return Number(n).toLocaleString('vi-VN',{minimumFractionDigits:1,maximumFractionDigits:1})+"%"; }

function csvEscape(v){
  if (v===null || v===undefined) return "";
  const s = String(v);
  if (/[",\n;]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}
function downloadCSV(filename, rows){
  const BOM = "\uFEFF"; // for Excel Vietnamese accents
  const csv = BOM + rows.map(row => row.map(csvEscape).join(",")).join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function loadKey(key, fallback){
  try{
    const r = await window.storage.get(key, false);
    if (r && r.value) return JSON.parse(r.value);
  } catch(e){}
  return fallback;
}
async function saveKey(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), false); } catch(e){ console.error(e); }
}

function App(){
  const [tab, setTab] = useState("batches"); // batches | summary
  const [date, setDate] = useState(todayStr());
  const [loading, setLoading] = useState(true);

  const [tare, setTare] = useState(DEFAULT_TARE);
  const [products, setProducts] = useState(DEFAULT_PRODUCTS);
  const [batches, setBatches] = useState([]);
  const [kho, setKho] = useState([]);

  useEffect(() => {
    (async () => {
      const [t, p, b, k] = await Promise.all([
        loadKey(STORE_TARE, DEFAULT_TARE),
        loadKey(STORE_PRODUCTS, DEFAULT_PRODUCTS),
        loadKey(STORE_BATCHES, []),
        loadKey(STORE_KHO, []),
      ]);
      setTare(t); setProducts(p); setBatches(b); setKho(k);
      setLoading(false);
    })();
  }, []);

  const updateTare = (key, val) => {
    const next = { ...tare, [key]: val };
    setTare(next);
    saveKey(STORE_TARE, next);
  };

  // ---------- PRODUCT CATALOG ----------
  const [newCode, setNewCode] = useState("");
  const [newName, setNewName] = useState("");
  const [newKlbb, setNewKlbb] = useState("");

  const addProduct = () => {
    if (!newName.trim()) return;
    const next = [...products, { code: newCode.trim(), name: newName.trim(), klbb: newKlbb ? parseFloat(newKlbb) : 0.03 }];
    setProducts(next); saveKey(STORE_PRODUCTS, next);
    setNewCode(""); setNewName(""); setNewKlbb("");
  };
  const updateProduct = (idx, field, value) => {
    const next = products.map((p,i)=> i===idx ? {...p, [field]: field==="klbb" ? parseFloat(value)||0 : value} : p);
    setProducts(next); saveKey(STORE_PRODUCTS, next);
  };
  const deleteProduct = (idx) => {
    const next = products.filter((_,i)=>i!==idx);
    setProducts(next); saveKey(STORE_PRODUCTS, next);
    if (productIdx >= next.length) setProductIdx(0);
  };

  // ---------- BATCH FORM STATE ----------
  const [productIdx, setProductIdx] = useState(0);
  const [xe1Gross, setXe1Gross] = useState("");
  const [xe2Gross, setXe2Gross] = useState("");
  const [note, setNote] = useState("");

  const x1 = parseFloat(xe1Gross);
  const x2 = parseFloat(xe2Gross);
  const totalGross = (!isNaN(x1) ? x1 : 0) + (!isNaN(x2) ? x2 : 0);
  const tareSum = (parseFloat(tare.xe1)||0) + (parseFloat(tare.xe2)||0);
  const netAfterRoast = (!isNaN(x1) || !isNaN(x2)) ? Math.max(totalGross - tareSum, 0) : null;
  const canAddBatch = (!isNaN(x1) || !isNaN(x2)) && totalGross > tareSum;

  const addBatch = async () => {
    if (!canAddBatch) return;
    const prod = products[productIdx] || products[0];
    const entry = {
      id: Date.now()+"_"+Math.random().toString(36).slice(2,7),
      date, code: prod.code, product: prod.name,
      xe1: isNaN(x1)?0:x1, xe2: isNaN(x2)?0:x2,
      tare1: parseFloat(tare.xe1)||0, tare2: parseFloat(tare.xe2)||0,
      totalGross: Number(totalGross.toFixed(2)),
      netAfterRoast: Number(netAfterRoast.toFixed(2)),
      note: note.trim(),
      createdAt: new Date().toISOString(),
    };
    const next = [entry, ...batches];
    setBatches(next);
    saveKey(STORE_BATCHES, next);
    setXe1Gross(""); setXe2Gross(""); setNote("");
  };
  const deleteBatch = (id) => {
    const next = batches.filter(b=>b.id!==id);
    setBatches(next); saveKey(STORE_BATCHES, next);
  };

  const dayBatches = useMemo(() => batches.filter(b=>b.date===date)
    .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)), [batches, date]);

  const dayTotalsByProduct = useMemo(() => {
    const map = {};
    dayBatches.forEach(b => {
      const k = b.code+"|"+b.product;
      if (!map[k]) map[k] = { code:b.code, product:b.product, count:0, sumGross:0, sumNet:0 };
      map[k].count++; map[k].sumGross += b.totalGross; map[k].sumNet += b.netAfterRoast;
    });
    return Object.values(map);
  }, [dayBatches]);

  const dayTotalsAll = useMemo(() => {
    if (dayBatches.length===0) return null;
    return {
      count: dayBatches.length,
      sumGross: dayBatches.reduce((s,b)=>s+b.totalGross,0),
      sumNet: dayBatches.reduce((s,b)=>s+b.netAfterRoast,0),
    };
  }, [dayBatches]);

  // ---------- KHO (DAILY SUMMARY) ----------
  const dayKho = useMemo(() => kho.filter(k=>k.date===date), [kho, date]);

  const addKhoRow = async () => {
    const prod = products[0];
    const autoNet = dayTotalsByProduct.find(p=>p.code===prod.code && p.product===prod.name);
    const entry = {
      id: Date.now()+"_"+Math.random().toString(36).slice(2,7),
      date, code: prod.code, product: prod.name, klbb: prod.klbb,
      tongSauRang: autoNet ? Number(autoNet.sumNet.toFixed(2)) : 0,
      slNhapKho: "", klNhapKho: "", baoBiNhan: "",
    };
    const next = [...kho, entry];
    setKho(next); saveKey(STORE_KHO, next);
  };
  const updateKhoRow = (id, field, value) => {
    const next = kho.map(r => r.id===id ? {...r, [field]: value} : r);
    setKho(next); saveKey(STORE_KHO, next);
  };
  const deleteKhoRow = (id) => {
    const next = kho.filter(r=>r.id!==id);
    setKho(next); saveKey(STORE_KHO, next);
  };
  const pullFromBatches = (id) => {
    const row = kho.find(r=>r.id===id);
    if (!row) return;
    const match = dayTotalsByProduct.find(p=>p.code===row.code && p.product===row.product);
    updateKhoRow(id, "tongSauRang", match ? Number(match.sumNet.toFixed(2)) : 0);
  };

  const khoComputed = useMemo(() => dayKho.map(r => {
    const tsr = parseFloat(r.tongSauRang);
    const kln = parseFloat(r.klNhapKho);
    const sln = parseFloat(r.slNhapKho);
    const bbn = parseFloat(r.baoBiNhan);
    const haoHutKC = (!isNaN(tsr) && !isNaN(kln)) ? Number((tsr-kln).toFixed(3)) : null;
    const lossPct = (!isNaN(tsr) && tsr>0 && haoHutKC!==null) ? Number((haoHutKC/tsr*100).toFixed(2)) : null;
    const haoHutBB = (!isNaN(bbn) && !isNaN(sln)) ? Number((bbn-sln).toFixed(0)) : null;
    return { ...r, haoHutKC, lossPct, haoHutBB };
  }), [dayKho]);

  const dayLossAvg = useMemo(() => {
    const valid = khoComputed.filter(r=>r.lossPct!==null);
    if (valid.length===0) return null;
    const totalNet = valid.reduce((s,r)=>s+parseFloat(r.tongSauRang||0),0);
    const totalLoss = valid.reduce((s,r)=>s+(r.haoHutKC||0),0);
    return totalNet>0 ? (totalLoss/totalNet*100) : null;
  }, [khoComputed]);

  // ---------- EXPORT CSV ----------
  const exportBatchesCSV = (scope) => {
    const data = scope==="day" ? dayBatches : batches;
    const header = ["Ngày","Giờ","Code","Sản phẩm","Xe 1 (kg)","Xe 2 (kg)","Bì Xe 1","Bì Xe 2","Tổng cân (kg)","KL sau rang (kg)","Ghi chú"];
    const rows = [header, ...data.slice().sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)).map(b => [
      b.date, new Date(b.createdAt).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),
      b.code, b.product, fmt(b.xe1), fmt(b.xe2), fmt(b.tare1), fmt(b.tare2), fmt(b.totalGross), fmt(b.netAfterRoast), b.note
    ])];
    downloadCSV(`me_rang_${scope==="day"?date:"all"}.csv`, rows);
  };

  const exportKhoCSV = (scope) => {
    const data = (scope==="day" ? dayKho : kho).map(r => {
      const tsr = parseFloat(r.tongSauRang);
      const kln = parseFloat(r.klNhapKho);
      const sln = parseFloat(r.slNhapKho);
      const bbn = parseFloat(r.baoBiNhan);
      const haoHutKC = (!isNaN(tsr) && !isNaN(kln)) ? (tsr-kln) : null;
      const lossPct = (!isNaN(tsr) && tsr>0 && haoHutKC!==null) ? (haoHutKC/tsr*100) : null;
      const haoHutBB = (!isNaN(bbn) && !isNaN(sln)) ? (bbn-sln) : null;
      return { ...r, haoHutKC, lossPct, haoHutBB };
    });
    const header = ["Ngày","Code","Sản phẩm","KLBB (kg)","Tổng KL sau rang (kg)","Loss cân (%)","SL nhập kho","KL nhập kho (kg)","Bao bì nhận (túi)","Hao hụt KC (kg)","Hao hụt BB (túi)"];
    const rows = [header, ...data.map(r => [
      r.date, r.code, r.product, r.klbb, fmt(r.tongSauRang),
      r.lossPct!==null?fmt(r.lossPct):"", r.slNhapKho, r.klNhapKho, r.baoBiNhan,
      r.haoHutKC!==null?fmt(r.haoHutKC,3):"", r.haoHutBB!==null?r.haoHutBB:""
    ])];
    downloadCSV(`hao_hut_${scope==="day"?date:"all"}.csv`, rows);
  };

  const exportProductsCSV = () => {
    const header = ["Code","Tên sản phẩm","KLBB (kg/gói)"];
    const rows = [header, ...products.map(p => [p.code, p.name, p.klbb])];
    downloadCSV("danh_muc_san_pham.csv", rows);
  };

  return (
    <div>
      <div className="gz-header">
        <div className="gz-eyebrow">Gimjaban · Kiểm soát hao hụt</div>
        <h1 className="gz-title">Sổ rang &amp; theo dõi hao hụt <span>Yield &amp; Loss Log</span></h1>
        <div className="gz-sub">Cân mẻ rang theo xe 1 / xe 2, trừ bì, tổng hợp theo sản phẩm và đối chiếu hao hụt khi nhập kho.</div>
        <div className="gz-tabs">
          <div className={"gz-tab "+(tab==="batches"?"active":"")} onClick={()=>setTab("batches")}>Cân mẻ rang</div>
          <div className={"gz-tab "+(tab==="summary"?"active":"")} onClick={()=>setTab("summary")}>Tổng hợp hao hụt theo ngày</div>
          <div className={"gz-tab "+(tab==="products"?"active":"")} onClick={()=>setTab("products")}>Danh mục sản phẩm</div>
        </div>
      </div>

      <div className="gz-body">
        <div className="gz-daterow">
          <label>Ngày</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
          <div className="gz-tare-pills">
            <span className="gz-pill">Xe 1 = <input type="number" step="0.01" value={tare.xe1} onChange={e=>updateTare("xe1", e.target.value)} /> kg</span>
            <span className="gz-pill">Xe 2 = <input type="number" step="0.01" value={tare.xe2} onChange={e=>updateTare("xe2", e.target.value)} /> kg</span>
          </div>
        </div>

        {tab === "batches" && (
          <React.Fragment>
            <div className="gz-form">
              <div className="gz-form-title">Nhập mẻ mới (xe 1 &amp; xe 2)</div>
              <div className="gz-grid">
                <div className="gz-field">
                  <label>Sản phẩm</label>
                  <select value={productIdx} onChange={e=>setProductIdx(Number(e.target.value))}>
                    {products.map((p,i)=>(<option key={i} value={i}>{(p.code?p.code+" — ":"")+p.name}</option>))}
                  </select>
                </div>
                <div className="gz-field">
                  <label>Xe 1 - KL cân (kg)</label>
                  <input type="number" inputMode="decimal" step="0.01" placeholder="VD: 32.72" value={xe1Gross} onChange={e=>setXe1Gross(e.target.value)} />
                </div>
                <div className="gz-field">
                  <label>Xe 2 - KL cân (kg)</label>
                  <input type="number" inputMode="decimal" step="0.01" placeholder="VD: 32.12" value={xe2Gross} onChange={e=>setXe2Gross(e.target.value)} />
                </div>
                <div className="gz-field">
                  <label>Ghi chú (tuỳ chọn)</label>
                  <input type="text" placeholder="VD: mẻ 1" value={note} onChange={e=>setNote(e.target.value)} />
                </div>
              </div>
              <div className="gz-calc-row">
                <span>Tổng KL cân (xe1+xe2) = <span className="res">{fmt(totalGross)} kg</span></span>
                <span style={{opacity:0.3}}>|</span>
                <span>Trừ bì (xe1+xe2 = {fmt(tareSum)} kg) → KL sau rang = <span className="res">{netAfterRoast!==null ? fmt(netAfterRoast)+" kg" : "—"}</span></span>
                {totalGross>0 && totalGross<=tareSum && (
                  <span style={{color:"var(--red)"}}>⚠ Tổng KL cân phải lớn hơn tổng bì 2 xe</span>
                )}
              </div>
              <button className="gz-btn" disabled={!canAddBatch} onClick={addBatch}>+ Thêm mẻ vào sổ</button>
            </div>

            {dayTotalsAll && (
              <div className="gz-summary">
                <div className="gz-card"><div className="lbl">Số mẻ trong ngày</div><div className="val">{dayTotalsAll.count}</div></div>
                <div className="gz-card"><div className="lbl">Tổng KL cân</div><div className="val gold">{fmt(dayTotalsAll.sumGross)} kg</div></div>
                <div className="gz-card"><div className="lbl">Tổng KL sau rang</div><div className="val gold">{fmt(dayTotalsAll.sumNet)} kg</div></div>
              </div>
            )}

            {dayTotalsByProduct.length > 0 && (
              <div className="gz-table-wrap">
                <div className="gz-table-head"><h3>Tổng theo sản phẩm trong ngày</h3></div>
                <table>
                  <thead><tr><th>Code</th><th>Sản phẩm</th><th>Số mẻ</th><th>Tổng KL cân</th><th>Tổng KL sau rang</th></tr></thead>
                  <tbody>
                    {dayTotalsByProduct.map((p,i)=>(
                      <tr key={i}><td>{p.code||"—"}</td><td>{p.product}</td><td>{p.count}</td><td>{fmt(p.sumGross)} kg</td><td>{fmt(p.sumNet)} kg</td></tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            <div className="gz-table-wrap">
              <div className="gz-table-head">
                <h3>Chi tiết từng mẻ — {date}</h3>
                <div style={{display:"flex",gap:8}}>
                  <button className="gz-btn small" onClick={()=>exportBatchesCSV("day")}>⤓ Xuất CSV (ngày)</button>
                  <button className="gz-btn small" onClick={()=>exportBatchesCSV("all")}>⤓ Xuất CSV (toàn bộ)</button>
                </div>
              </div>
              {loading ? (
                <div className="empty-state">Đang tải dữ liệu...</div>
              ) : dayBatches.length===0 ? (
                <div className="empty-state">Chưa có mẻ nào trong ngày này.</div>
              ) : (
                <div style={{overflowX:"auto"}}>
                  <table>
                    <thead><tr><th>Giờ</th><th>Sản phẩm</th><th>Xe 1</th><th>Xe 2</th><th>Tổng cân</th><th>Sau rang</th><th>Ghi chú</th><th></th></tr></thead>
                    <tbody>
                      {dayBatches.map(b=>(
                        <tr key={b.id}>
                          <td>{new Date(b.createdAt).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}</td>
                          <td>{b.product}</td>
                          <td>{fmt(b.xe1)}</td>
                          <td>{fmt(b.xe2)}</td>
                          <td>{fmt(b.totalGross)}</td>
                          <td>{fmt(b.netAfterRoast)}</td>
                          <td>{b.note||"—"}</td>
                          <td><button className="gz-btn danger" onClick={()=>deleteBatch(b.id)}>Xoá</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </React.Fragment>
        )}

        {tab === "summary" && (
          <React.Fragment>
            {dayLossAvg !== null && (
              <div className="gz-summary">
                <div className="gz-card">
                  <div className="lbl">Loss cân trung bình ngày</div>
                  <div className={"val "+(dayLossAvg>5?"warn":"ok")}>{fmtPct(dayLossAvg)}</div>
                  <div className="note">Tổng hao hụt / tổng KL sau rang</div>
                </div>
              </div>
            )}
            <div className="gz-table-wrap">
              <div className="gz-table-head">
                <h3>Theo dõi tỉ lệ hao hụt trọng lượng &amp; bao bì — {date}</h3>
                <div style={{display:"flex",gap:8}}>
                  <button className="gz-btn small" onClick={addKhoRow}>+ Thêm dòng</button>
                  <button className="gz-btn small" onClick={()=>exportKhoCSV("day")}>⤓ Xuất CSV (ngày)</button>
                  <button className="gz-btn small" onClick={()=>exportKhoCSV("all")}>⤓ Xuất CSV (toàn bộ)</button>
                </div>
              </div>
              {loading ? (
                <div className="empty-state">Đang tải dữ liệu...</div>
              ) : khoComputed.length===0 ? (
                <div className="empty-state">Chưa có dòng tổng hợp nào cho ngày này. Bấm "+ Thêm dòng" để bắt đầu.</div>
              ) : (
                <div style={{overflowX:"auto"}}>
                  <table>
                    <thead>
                      <tr>
                        <th>Code</th><th>Sản phẩm</th><th>KLBB (g)</th>
                        <th>Tổng KL sau rang (kg)</th><th></th>
                        <th>Loss cân</th>
                        <th>SL nhập kho</th><th>KL nhập kho (kg)</th>
                        <th>Bao bì nhận (túi)</th>
                        <th>Hao hụt KC (kg)</th><th>Hao hụt BB (túi)</th><th></th>
                      </tr>
                    </thead>
                    <tbody>
                      {khoComputed.map(r=>(
                        <tr key={r.id}>
                          <td>{r.code||"—"}</td>
                          <td>{r.product}</td>
                          <td>{r.klbb}</td>
                          <td><input type="number" step="0.1" value={r.tongSauRang} onChange={e=>updateKhoRow(r.id,"tongSauRang",e.target.value)} /></td>
                          <td><button className="gz-btn small" onClick={()=>pullFromBatches(r.id)} title="Lấy tổng từ sổ cân mẻ rang">↺ tự động</button></td>
                          <td>{r.lossPct!==null ? <span className={"tag "+(r.lossPct>5?"warn":"ok")}>{fmtPct(r.lossPct)}</span> : "—"}</td>
                          <td><input type="number" step="1" value={r.slNhapKho} onChange={e=>updateKhoRow(r.id,"slNhapKho",e.target.value)} /></td>
                          <td><input type="number" step="0.1" value={r.klNhapKho} onChange={e=>updateKhoRow(r.id,"klNhapKho",e.target.value)} /></td>
                          <td><input type="number" step="1" value={r.baoBiNhan} onChange={e=>updateKhoRow(r.id,"baoBiNhan",e.target.value)} /></td>
                          <td>{r.haoHutKC!==null ? fmt(r.haoHutKC,3)+" kg" : "—"}</td>
                          <td>{r.haoHutBB!==null ? r.haoHutBB+" túi" : "—"}</td>
                          <td><button className="gz-btn danger" onClick={()=>deleteKhoRow(r.id)}>Xoá</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              <div className="gz-foot">Loss cân = (Tổng KL sau rang − KL nhập kho) / Tổng KL sau rang. Hao hụt BB = Bao bì nhận − SL nhập kho. Bấm "↺ tự động" để lấy Tổng KL sau rang từ sổ cân mẻ rang (tab bên trái) theo đúng sản phẩm &amp; ngày.</div>
            </div>
          </React.Fragment>
        )}

        {tab === "products" && (
          <div className="gz-table-wrap">
            <div className="gz-table-head">
              <h3>Danh mục sản phẩm</h3>
              <button className="gz-btn small" onClick={exportProductsCSV}>⤓ Xuất CSV</button>
            </div>
            <div style={{padding:"16px 20px", borderBottom:"1px solid var(--line)"}}>
              <div className="gz-grid" style={{marginBottom:10}}>
                <div className="gz-field"><label>Code</label><input type="text" placeholder="VD: 1024505" value={newCode} onChange={e=>setNewCode(e.target.value)} /></div>
                <div className="gz-field" style={{gridColumn:"span 2"}}><label>Tên sản phẩm</label><input type="text" placeholder="VD: BBG RONG BIỂN GIÒN NƯỚC TƯƠNG 50G*20EA" value={newName} onChange={e=>setNewName(e.target.value)} /></div>
                <div className="gz-field"><label>KLBB (kg/gói)</label><input type="number" step="0.001" placeholder="0.05" value={newKlbb} onChange={e=>setNewKlbb(e.target.value)} /></div>
              </div>
              <button className="gz-btn small" onClick={addProduct}>+ Thêm sản phẩm</button>
            </div>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr><th>Code</th><th>Tên sản phẩm</th><th>KLBB (kg/gói)</th><th></th></tr></thead>
                <tbody>
                  {products.map((p,i)=>(
                    <tr key={i}>
                      <td><input type="text" value={p.code} onChange={e=>updateProduct(i,"code",e.target.value)} /></td>
                      <td style={{minWidth:280}}><input type="text" style={{width:"100%"}} value={p.name} onChange={e=>updateProduct(i,"name",e.target.value)} /></td>
                      <td><input type="number" step="0.001" value={p.klbb} onChange={e=>updateProduct(i,"klbb",e.target.value)} /></td>
                      <td><button className="gz-btn danger" onClick={()=>deleteProduct(i)}>Xoá</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="gz-foot">Danh mục này dùng chung cho cả 2 tab "Cân mẻ rang" và "Tổng hợp hao hụt theo ngày". Sửa hoặc xoá tại đây sẽ áp dụng cho lựa chọn sản phẩm ở các tab khác.</div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
